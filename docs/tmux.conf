# 滑鼠操作（最大幫助）：
# - 點擊任一 pane 切換焦點
# - 滾輪可上下捲動歷史
# - 拖曳 pane 邊界調整大小
set -g mouse on

# 按下 Ctrl+B 時，狀態列會反白顯示 [PREFIX]，讓你知道 chord 已觸發
set -g status-right "#{?client_prefix,#[reverse] PREFIX #[noreverse] ,}%H:%M  "
set -g status-right-length 50

# 顯示 pane 編號的時間拉長（按 Ctrl+B q 觸發），方便看
set -g display-panes-time 4000

# 視窗 / pane 從 1 開始編號（更直覺）
set -g base-index 1
setw -g pane-base-index 1

# 增加 scrollback 行數
set -g history-limit 50000

# 用 vi 風格在 copy mode（捲動模式）內移動
setw -g mode-keys vi

# 重新載入設定的快捷鍵：Ctrl+B → r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"
